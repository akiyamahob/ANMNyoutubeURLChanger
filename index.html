<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YouTube URL Shorter</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="converter" aria-labelledby="app-title">
        <header class="app-header">
          <h1 id="app-title">YouTube URL Shorter</h1>
          <p>YouTubeのURLを某掲示板向けのサムネの出るURLに変換します</p>
          <p>URLを"変換前"にペーストすると、"変換後"に変換後URLが出るのでコピーしてください</p>
        </header>

        <div class="field-group">
          <div class="field-heading">
            <label for="source-url">変換前</label>
            <div class="button-row">
            </div>
          </div>
          <textarea
            id="source-url"
            inputmode="url"
            placeholder="https://www.youtube.com/shorts/xxxxxxxxxxx"
            spellcheck="false"
          ></textarea>
        </div>

        <div class="field-group">
          <div class="field-heading">
            <label for="result-url">変換後</label>
            <button class="primary-button" id="copy-button" type="button">コピー</button>
          </div>
          <textarea id="result-url" readonly spellcheck="false" aria-describedby="error"></textarea>
        </div>

        <section class="preview-group" aria-labelledby="preview-title">
          <div class="field-heading">
            <h2 id="preview-title">プレビュー</h2>
          </div>
          <div class="preview-card is-empty" id="preview-card">
            <a
              class="preview-link"
              id="preview-link"
              href=""
              target="_blank"
              rel="noopener noreferrer"
              aria-label="動画をYouTubeで開く"
            >
              <img id="preview-image" alt="" loading="lazy">
            </a>
            <div class="preview-meta">
              <p class="preview-title" id="preview-title-text">動画サムネとタイトルをここに表示します。</p>
              <p class="preview-url" id="preview-url-text"></p>
            </div>
          </div>
        </section>

        <p class="error-message" id="error" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
